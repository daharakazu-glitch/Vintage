    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&family=Tinos:wght@700&display=swap');

        body {
            background-color: #166534;
            font-family: 'Noto Sans JP', sans-serif;
        }

        .font-english {
            font-family: 'Tinos', 'Times New Roman', serif;
            font-weight: 700;
            font-size: 1.15rem;
            line-height: 1.8rem;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease-in-out;
        }

        .btn-primary { background-color: #16a34a; color: white; }
        .btn-primary:hover { background-color: #15803d; }
        .btn-secondary { background-color: #6b7280; color: white; }
        .btn-secondary:hover { background-color: #4b5563; }

        .tag-badge {
            display: inline-block;
            font-size: 0.7rem;
            font-weight: bold;
            padding: 2px 8px;
            border-radius: 9999px;
            margin-right: 4px;
        }

        .choice-btn {
            display: block;
            width: 100%;
            text-align: left;
            padding: 8px 14px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            background: white;
            transition: all 0.15s;
        }

        .choice-btn:hover:not(:disabled) { border-color: #86efac; background: #f0fdf4; }
        .choice-btn.correct { border-color: #22c55e; background: #dcfce7; }
        .choice-btn.wrong { border-color: #ef4444; background: #fee2e2; }

        .piece-chip {
            display: inline-block;
            padding: 5px 12px;
            margin: 3px;
            border: 2px solid #86efac;
            border-radius: 9999px;
            background: #f0fdf4;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.15s;
            user-select: none;
        }

        .piece-chip:hover { background: #bbf7d0; }
        .piece-chip.used { opacity: 0.25; pointer-events: none; }

        .built-chip {
            display: inline-block;
            padding: 5px 12px;
            margin: 3px;
            border: 2px solid #16a34a;
            border-radius: 9999px;
            background: #dcfce7;
            cursor: pointer;
            font-weight: bold;
            user-select: none;
        }

        .answer-area { display: none; }
        .problem-item.show-answer .answer-area { display: block; }

        .problem-item.problem-mastered {
            background-color: #fefce8 !important;
            border-color: #facc15 !important;
        }

        u { text-underline-offset: 4px; }
    </style>
</head>

                </div>

                <div id="problem-list" class="space-y-6">
                    <!-- Problems will be populated by JS -->
                </div>
            </main>
        </div>
    </div>

        const CIRCLED = ['①', '②', '③', '④', '⑤', '⑥'];

        // --- Voice Synthesis Setup ---
        if (typeof speechSynthesis !== 'undefined') {
            speechSynthesis.getVoices();
            if (speechSynthesis.onvoiceschanged !== undefined) {
                speechSynthesis.onvoiceschanged = () => { speechSynthesis.getVoices(); };
            }
        }

        function getBestEnglishVoice(voices) {
            const excludedVoices = [
                'albert', 'bad news', 'bells', 'boing', 'bubbles', 'cellos',
                'deranged', 'good news', 'hysterical', 'pipe organ', 'trinoids',
                'whisper', 'zarvox', 'fred', 'juniper', 'ralph', 'kathy', 'siri'
            ];

            const englishVoices = voices.filter(v => {
                const lang = v.lang.toLowerCase();
                const name = v.name.toLowerCase();
                return lang.startsWith('en') && !excludedVoices.some(ex => name.includes(ex));
            });

            if (englishVoices.length === 0) {
                return voices.find(v => v.lang.toLowerCase().startsWith('en')) || null;
            }

            const isGoogle = v => v.name.toLowerCase().includes('google');
            const isSamantha = v => v.name.toLowerCase().includes('samantha');
            const isDaniel = v => v.name.toLowerCase().includes('daniel');
            const isPremium = v => v.name.toLowerCase().includes('premium') || v.name.toLowerCase().includes('enhanced') || v.name.toLowerCase().includes('natural');
            const isUS = v => v.lang.toLowerCase() === 'en-us';
            const isGB = v => v.lang.toLowerCase() === 'en-gb';

            let voice = englishVoices.find(v => isUS(v) && isGoogle(v));
            if (voice) return voice;
            voice = englishVoices.find(v => isGB(v) && isGoogle(v));
            if (voice) return voice;
            voice = englishVoices.find(isGoogle);
            if (voice) return voice;
            voice = englishVoices.find(isSamantha);
            if (voice) return voice;
            voice = englishVoices.find(isDaniel);
            if (voice) return voice;
            voice = englishVoices.find(v => isUS(v) && isPremium(v));
            if (voice) return voice;
            voice = englishVoices.find(isPremium);
            if (voice) return voice;
            voice = englishVoices.find(v => isUS(v));
            if (voice) return voice;
            voice = englishVoices.find(v => isGB(v));
            if (voice) return voice;
            return englishVoices[0];
        }

        // --- Rendering helpers ---
        const TYPE_LABELS = {
            choice: '4択', error: '誤り指摘', ordering: '整序英作文',
            fill: '空所補充', rewrite: '書き換え'
        };

        function tagBadges(item) {
            let html = `<span class="tag-badge bg-gray-200 text-gray-600">${TYPE_LABELS[item.type] || ''}</span>`;
            (item.tags || []).forEach(tag => {
                if (tag === '基本') html += `<span class="tag-badge bg-blue-100 text-blue-700">基本</span>`;
                else if (tag === '発展') html += `<span class="tag-badge bg-purple-100 text-purple-700">発展</span>`;
                else if (tag.includes('頻出')) html += `<span class="tag-badge bg-red-100 text-red-700">●${tag}</span>`;
                else html += `<span class="tag-badge bg-gray-100 text-gray-700">${tag}</span>`;
            });
            return html;
        }

        function isJaLine(line) {
            return /[぀-ヿ一-鿿。，、]/.test(line) && !/<u>/.test(line) && !/[a-zA-Z]{3}/.test(line);
        }

        function questionHtml(item) {
            return item.question.split('\n').map(line => {
                if (isJaLine(line)) return `<p class="mb-1 text-gray-700">${line}</p>`;
                return `<p class="mb-1 font-english">${line}</p>`;
            }).join('');
        }

        function shuffle(arr) {
            const a = [...arr];
            for (let i = a.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [a[i], a[j]] = [a[j], a[i]];
            }
            return a;
        }

        function normalizeSentence(s) {
            return s.toLowerCase().replace(/[^a-z0-9\s]/g, '').replace(/\s+/g, ' ').trim();
        }

        function answerSummary(item) {
            if (item.type === 'choice') {
                return `${CIRCLED[item.answerIndex] || ''} ${item.choices[item.answerIndex] || ''}`;
            }
            if (item.type === 'error') return item.rawAnswer;
            return item.answer || item.rawAnswer;
        }

        // --- Interaction builders per type ---
        function buildInteraction(item, container, onAnswered) {
            if (item.type === 'choice') {
                const wrap = document.createElement('div');
                wrap.className = 'space-y-2 mt-3';
                item.choices.forEach((choice, idx) => {
                    const btn = document.createElement('button');
                    btn.className = 'choice-btn font-english';
                    btn.innerHTML = `${CIRCLED[idx]}　${choice}`;
                    btn.onclick = (e) => {
                        e.stopPropagation();
                        const correct = idx === item.answerIndex;
                        btn.classList.add(correct ? 'correct' : 'wrong');
                        wrap.querySelectorAll('button').forEach((b, i) => {
                            b.disabled = true;
                            if (i === item.answerIndex) b.classList.add('correct');
                        });
                        onAnswered(correct);
                    };
                    wrap.appendChild(btn);
                });
                container.appendChild(wrap);
            } else if (item.type === 'error') {
                const hint = document.createElement('p');
                hint.className = 'mt-3 text-sm text-gray-500';
                hint.textContent = '下線部①〜④のうち、誤りを含むものを選んでください。';
                container.appendChild(hint);
                const wrap = document.createElement('div');
                wrap.className = 'flex gap-2 mt-2 flex-wrap';
                for (let idx = 0; idx < 4; idx++) {
                    const btn = document.createElement('button');
                    btn.className = 'choice-btn font-english';
                    btn.style.width = 'auto';
                    btn.textContent = CIRCLED[idx];
                    btn.onclick = (e) => {
                        e.stopPropagation();
                        const correct = idx === item.answerIndex;
                        btn.classList.add(correct ? 'correct' : 'wrong');
                        wrap.querySelectorAll('button').forEach((b, i) => {
                            b.disabled = true;
                            if (i === item.answerIndex) b.classList.add('correct');
                        });
                        onAnswered(correct);
                    };
                    wrap.appendChild(btn);
                }
                container.appendChild(wrap);
            } else if (item.type === 'ordering') {
                const hint = document.createElement('p');
                hint.className = 'mt-3 text-sm text-gray-500';
                hint.textContent = '語句を正しい順に並べてください。' + (item.note ? `（${item.note}）` : '');
                container.appendChild(hint);

                const builtArea = document.createElement('div');
                builtArea.className = 'min-h-[44px] p-2 border-2 border-dashed border-gray-300 rounded-lg mt-2 bg-gray-50';
                container.appendChild(builtArea);

                const chipArea = document.createElement('div');
                chipArea.className = 'mt-2';
                container.appendChild(chipArea);

                let built = [];

                function renderChips() {
                    builtArea.innerHTML = '';
                    built.forEach((piece, bi) => {
                        const chip = document.createElement('span');
                        chip.className = 'built-chip font-english';
                        chip.textContent = piece;
                        chip.title = 'クリックで戻す';
                        chip.onclick = (e) => {
                            e.stopPropagation();
                            built.splice(bi, 1);
                            renderChips();
                        };
                        builtArea.appendChild(chip);
                    });
                    chipArea.querySelectorAll('.piece-chip').forEach(chip => {
                        const idx = Number(chip.dataset.idx);
                        const usedCount = built.filter(b => b === chip.dataset.piece).length;
                        const sameChips = Array.from(chipArea.querySelectorAll('.piece-chip')).filter(c => c.dataset.piece === chip.dataset.piece);
                        sameChips.forEach((c, i) => c.classList.toggle('used', i < usedCount));
                    });
                }

                shuffle(item.pieces.map((p, i) => ({ p, i }))).forEach(({ p, i }) => {
                    const chip = document.createElement('span');
                    chip.className = 'piece-chip font-english';
                    chip.textContent = p;
                    chip.dataset.piece = p;
                    chip.dataset.idx = i;
                    chip.onclick = (e) => {
                        e.stopPropagation();
                        if (chip.classList.contains('used')) return;
                        built.push(p);
                        renderChips();
                    };
                    chipArea.appendChild(chip);
                });

                const btnRow = document.createElement('div');
                btnRow.className = 'flex gap-2 mt-3';
                const checkBtn = document.createElement('button');
                checkBtn.className = 'bg-green-600 hover:bg-green-700 text-white font-bold py-1 px-4 rounded shadow text-sm';
                checkBtn.textContent = '答え合わせ';
                checkBtn.onclick = (e) => {
                    e.stopPropagation();
                    const correct = normalizeSentence(built.join(' ')) === normalizeSentence(item.answer);
                    builtArea.style.borderColor = correct ? '#22c55e' : '#ef4444';
                    builtArea.style.background = correct ? '#dcfce7' : '#fee2e2';
                    checkBtn.disabled = true;
                    resetBtn.disabled = true;
                    onAnswered(correct);
                };
                const resetBtn = document.createElement('button');
                resetBtn.className = 'bg-gray-400 hover:bg-gray-500 text-white font-bold py-1 px-4 rounded shadow text-sm';
                resetBtn.textContent = 'やり直す';
                resetBtn.onclick = (e) => {
                    e.stopPropagation();
                    built = [];
                    renderChips();
                };
                btnRow.appendChild(checkBtn);
                btnRow.appendChild(resetBtn);
                container.appendChild(btnRow);
            } else {
                // fill / rewrite: 解答を頭の中で考え、表示して自己採点
                const hint = document.createElement('p');
                hint.className = 'mt-3 text-sm text-gray-500';
                hint.textContent = item.type === 'fill' ? '空所に入る語句を考えてから、解答を表示して自己採点してください。' : '答えを考えてから、解答を表示して自己採点してください。';
                container.appendChild(hint);
                const btnRow = document.createElement('div');
                btnRow.className = 'flex gap-2 mt-2 flex-wrap';
                const revealBtn = document.createElement('button');
                revealBtn.className = 'bg-green-600 hover:bg-green-700 text-white font-bold py-1 px-4 rounded shadow text-sm';
                revealBtn.textContent = '解答を表示';
                const okBtn = document.createElement('button');
                okBtn.className = 'hidden bg-blue-500 hover:bg-blue-600 text-white font-bold py-1 px-4 rounded shadow text-sm';
                okBtn.textContent = '○ できた';
                const ngBtn = document.createElement('button');
                ngBtn.className = 'hidden bg-red-400 hover:bg-red-500 text-white font-bold py-1 px-4 rounded shadow text-sm';
                ngBtn.textContent = '× できなかった';
                revealBtn.onclick = (e) => {
                    e.stopPropagation();
                    revealBtn.classList.add('hidden');
                    okBtn.classList.remove('hidden');
                    ngBtn.classList.remove('hidden');
                    const wrapper = container.closest('.problem-item');
                    wrapper.classList.add('show-answer');
                    const rbtn = wrapper.querySelector('.reveal-answer-btn');
                    if (rbtn) rbtn.innerText = '解答を隠す';
                };
                okBtn.onclick = (e) => { e.stopPropagation(); okBtn.disabled = ngBtn.disabled = true; onAnswered(true); };
                ngBtn.onclick = (e) => { e.stopPropagation(); okBtn.disabled = ngBtn.disabled = true; onAnswered(false); };
                btnRow.appendChild(revealBtn);
                btnRow.appendChild(okBtn);
                btnRow.appendChild(ngBtn);
                container.appendChild(btnRow);
            }
        }

        // --- Main render ---
        function renderChapter() {
            problemList.innerHTML = '';
            chapterData.forEach(item => {
                const div = document.createElement('div');
                div.className = 'problem-item p-4 border border-gray-200 rounded-lg bg-white transition-shadow duration-300 hover:shadow-md';

            <input type="checkbox" class="problem-checkbox mt-1 h-5 w-5 rounded border-gray-300 text-green-600 focus:ring-green-500" data-id="${item.id}">
            <span class="text-sm font-bold text-gray-400 w-12 flex-shrink-0">${item.id}</span>
            <div class="flex-1 cursor-pointer min-w-0">
                <div class="mb-2 flex justify-between items-start gap-2">
                    <div>${tagBadges(item)}</div>
                    <button class="reveal-answer-btn flex-shrink-0 text-xs font-bold text-green-700 border border-green-300 rounded px-2 py-1 hover:bg-green-50 transition-colors">解答を見る</button>
                </div>
                <div class="question-area">${questionHtml(item)}</div>
                <div class="interaction-area"></div>
                <div class="answer-area mt-4 p-4 bg-green-50 border-l-4 border-green-500 rounded-r-lg">
                    <p class="font-bold text-green-800 mb-1">解答: <span class="font-english">${answerSummary(item)}</span></p>
                    ${item.en ? `<p class="font-english text-green-900 mb-1">${item.en}</p>` : ''}
                    ${item.ja ? `<p class="text-gray-700 text-sm whitespace-pre-wrap">${item.ja}</p>` : ''}
                </div>
                <div class="action-buttons mt-4 hidden flex-wrap gap-2">
                    <button class="play-sound-btn-local bg-green-500 hover:bg-green-600 text-white font-bold py-1 px-3 rounded shadow-md text-sm">音声再生</button>
                    <button class="play-slow-btn-local bg-teal-500 hover:bg-teal-600 text-white font-bold py-1 px-3 rounded shadow-md text-sm">ゆっくり</button>
                    <button class="record-btn-local bg-red-500 hover:bg-red-600 text-white font-bold py-1 px-3 rounded shadow-md text-sm">録音評価</button>
                    <button class="toggle-master-btn-local bg-gray-500 hover:bg-gray-600 text-white font-bold py-1 px-3 rounded shadow-md text-sm">⭐ マスター</button>
                </div>
            </div>
        </div>
        `;

                const interactionArea = div.querySelector('.interaction-area');
                buildInteraction(item, interactionArea, (correct) => {
                    div.classList.add('show-answer');
                    div.querySelector('.action-buttons').classList.remove('hidden');
                    div.querySelector('.action-buttons').classList.add('flex');
                    const rbtn = div.querySelector('.reveal-answer-btn');
                    if (rbtn) rbtn.innerText = '解答を隠す';
                    activateProblem(div);
                    if (window.saveSolvedResult) window.saveSolvedResult(item.id, correct);
                });

                problemList.appendChild(div);
            });

            document.querySelectorAll('.problem-item .flex-1').forEach(item => {
                item.addEventListener('click', (e) => {
                    if (e.target.tagName === 'BUTTON' || e.target.tagName === 'INPUT' || e.target.classList.contains('piece-chip') || e.target.classList.contains('built-chip')) return;
                    activateProblem(e.currentTarget.closest('.problem-item'));
                });

                item.querySelector('.reveal-answer-btn').addEventListener('click', (e) => {
                    e.stopPropagation();
                    const wrapper = e.currentTarget.closest('.problem-item');
                    const shown = wrapper.classList.toggle('show-answer');
                    if (shown) {
                        wrapper.querySelector('.action-buttons').classList.remove('hidden');
                        wrapper.querySelector('.action-buttons').classList.add('flex');
                        activateProblem(wrapper);
                    }
                    e.currentTarget.innerText = shown ? '解答を隠す' : '解答を見る';
                });

                item.querySelector('.play-sound-btn-local').addEventListener('click', (e) => {
                    e.stopPropagation();
                    activateProblem(e.currentTarget.closest('.problem-item'));
                    playSound(1.0);
                });

                item.querySelector('.play-slow-btn-local').addEventListener('click', (e) => {
                    e.stopPropagation();
                    activateProblem(e.currentTarget.closest('.problem-item'));
                    playSound(0.7);
                });

                item.querySelector('.record-btn-local').addEventListener('click', (e) => {
                    e.stopPropagation();
                    activateProblem(e.currentTarget.closest('.problem-item'));
                    handleRecording();
                });

                item.querySelector('.toggle-master-btn-local').addEventListener('click', (e) => {
                    e.stopPropagation();
                    const wrapper = e.currentTarget.closest('.problem-item');
                    const problemId = wrapper.dataset.id;
                    const isMastered = wrapper.classList.contains('problem-mastered');
                    if (window.toggleProblemMasterState) {
                        window.toggleProblemMasterState(problemId, !isMastered);
                    } else {
                        wrapper.classList.toggle('problem-mastered');
                        e.currentTarget.innerText = wrapper.classList.contains('problem-mastered') ? '⭐ マスター解除' : '⭐ マスター';
                    }
                });
            });

            document.querySelectorAll('.problem-checkbox').forEach(checkbox => {
                checkbox.addEventListener('click', (e) => {
                    e.stopPropagation();
                    if (e.target.checked) selectedProblems.add(e.target.dataset.id);
                    else selectedProblems.delete(e.target.dataset.id);
                });
            });

            if (window.applyLoadedMasteredProblems) {
                window.applyLoadedMasteredProblems(window.localMasteredProblems);
            }
        }

        function activateProblem(wrapper) {
            if (activeProblemElement && activeProblemElement !== wrapper) {
                activeProblemElement.classList.remove('ring-2', 'ring-green-400', 'shadow-xl');
            }
            activeProblemElement = wrapper;
            activeProblemElement.classList.add('ring-2', 'ring-green-400', 'shadow-xl');
        }

        function showMessage(htmlContent, duration = null) {
            messageContent.innerHTML = htmlContent;
            messageModal.classList.remove('hidden');
            if (duration) setTimeout(() => messageModal.classList.add('hidden'), duration);
        }

        // --- Audio ---
        function playSound(speed = 1.0) {
            if (!activeProblemElement) return;
            const text = activeProblemElement.dataset.fullSentence;
            if (!text) {
                showMessage('<p>この問題には読み上げる英文がありません。</p>', 2000);
                return;
            }

            try { speechSynthesis.cancel(); } catch (e) { }

            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US';
            utterance.rate = speed;

            const voices = speechSynthesis.getVoices();
            const bestVoice = getBestEnglishVoice(voices);
            if (bestVoice) {
                utterance.voice = bestVoice;
                utterance.lang = bestVoice.lang;
            }
            utterance.onerror = (e) => console.error('SpeechSynthesis error:', e.error);
            speechSynthesis.speak(utterance);
        }

        // --- Recording / pronunciation evaluation ---
        function handleRecording() {
            if (!activeProblemElement) return;
            if (!activeProblemElement.dataset.fullSentence) {
                showMessage('<p>この問題には評価対象の英文がありません。</p>', 2000);
                return;
            }
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
                showMessage('<p>お使いのブラウザは音声認識に対応していません。</p>', 3000);
                return;
            }
            const recognition = new SpeechRecognition();
            recognition.lang = 'en-US';
            recognition.onstart = () => showMessage('<p class="text-2xl">マイクに向かって英文を読んでください...</p><div class="animate-pulse text-red-500 text-4xl mt-4">●</div>');
            recognition.onresult = (event) => evaluatePronunciation(event.results[0][0].transcript);
            recognition.onerror = () => showMessage('<p>認識エラーが発生しました。</p>', 2000);
            recognition.start();
        }

        function evaluatePronunciation(transcript) {
            const original = activeProblemElement.dataset.fullSentence.toLowerCase().replace(/[^\w\s]/g, '');
            const user = transcript.toLowerCase().replace(/[^\w\s]/g, '');
            const score = Math.min(100, Math.floor((user.split(' ').filter(w => original.includes(w)).length / original.split(' ').length) * 100) + 15);

            if (score >= 80) {
                const problemId = activeProblemElement.dataset.id;
                if (window.toggleProblemMasterState) {
                    window.toggleProblemMasterState(problemId, true);
                } else {
                    activeProblemElement.classList.add('problem-mastered');
                    const btn = activeProblemElement.querySelector('.toggle-master-btn-local');
                    if (btn) btn.innerText = '⭐ マスター解除';
                }
            }

            if (window.saveVintageScore) window.saveVintageScore('pronunciationScore_' + activeProblemElement.dataset.id, score);
            showMessage(`
                <h3 class="text-2xl font-bold mb-4">評価結果</h3>
                <p class="text-7xl font-bold text-green-600 mb-4">${score}<span class="text-2xl">点</span></p>
                <p class="text-gray-600 mb-2"><strong>認識結果:</strong> ${transcript}</p>
                ${score >= 80 ? '<p class="text-yellow-600 font-bold">⭐ 80点以上！この問題をマスターしました</p>' : ''}
                <button onclick="document.getElementById('message-modal').classList.add('hidden')" class="mt-6 bg-green-600 text-white py-2 px-6 rounded-lg">閉じる</button>
            `);
        }

        // --- Random Quiz (choice / error 問題から10問) ---
        function startQuiz() {
            const pool = chapterData.filter(d => d.type === 'choice' || d.type === 'error');
            if (pool.length === 0) {
                showMessage('<p>この章には選択式の問題がありません。</p>', 2500);
                return;
            }
            const questions = shuffle(pool).slice(0, Math.min(10, pool.length));
            let currentIdx = 0, score = 0;

            function nextQuestion() {
                if (currentIdx >= questions.length) {
                    const finalScore = Math.round(score / questions.length * 100);
                    if (window.saveVintageScore) window.saveVintageScore('quizScore', finalScore);
                    quizContent.innerHTML = `<h3 class="text-3xl font-bold mb-4">結果: ${score}/${questions.length}</h3><p class="text-6xl text-purple-600 font-bold">${finalScore}点</p>`;
                    return;
                }
                const q = questions[currentIdx];
                let optionsHtml, prompt;
                if (q.type === 'choice') {
                    prompt = '空所に入る最も適切なものを選んでください。';
                    optionsHtml = q.choices.map((opt, idx) =>
                        `<button data-idx="${idx}" class="quiz-opt p-3 border-2 border-gray-200 rounded-lg hover:bg-green-50 hover:border-green-300 font-english transition-colors text-left">${CIRCLED[idx]}　${opt}</button>`).join('');
                } else {
                    prompt = '下線部①〜④のうち、誤りを含むものを選んでください。';
                    optionsHtml = [0, 1, 2, 3].map(idx =>
                        `<button data-idx="${idx}" class="quiz-opt p-3 border-2 border-gray-200 rounded-lg hover:bg-green-50 hover:border-green-300 font-english transition-colors text-left">${CIRCLED[idx]}</button>`).join('');
                }

                quizContent.innerHTML = `
                    <p class="mb-2 text-gray-500">問題 ${currentIdx + 1}/${questions.length}　[${q.id}]</p>
                    <p class="text-sm text-gray-500 mb-2">${prompt}</p>
                    <div class="text-lg font-bold mb-6 text-green-900">${questionHtml(q)}</div>
                    <div class="grid grid-cols-1 gap-3">${optionsHtml}</div>
                    <div id="quiz-feedback" class="mt-4"></div>
                `;
                quizContent.querySelectorAll('.quiz-opt').forEach(btn => {
                    btn.onclick = () => {
                        const idx = Number(btn.dataset.idx);
                        const correct = idx === q.answerIndex;
                        if (correct) { btn.classList.add('bg-green-200', 'border-green-400'); score++; }
                        else btn.classList.add('bg-red-200', 'border-red-400');
                        quizContent.querySelectorAll('.quiz-opt').forEach((b) => {
                            b.disabled = true;
                            if (Number(b.dataset.idx) === q.answerIndex) b.classList.add('bg-green-200', 'border-green-400');
                        });
                        document.getElementById('quiz-feedback').innerHTML = `
                            <div class="p-3 bg-green-50 border-l-4 border-green-500 rounded-r-lg">
                                <p class="font-bold text-green-800">解答: <span class="font-english">${answerSummary(q)}</span></p>
                                ${q.en ? `<p class="font-english text-green-900">${q.en}</p>` : ''}
                                ${q.ja ? `<p class="text-gray-700 text-sm whitespace-pre-wrap">${q.ja}</p>` : ''}
                            </div>`;
                        setTimeout(() => { currentIdx++; nextQuestion(); }, 3500);
                    };
                });
            }
            quizModal.classList.remove('hidden');
            nextQuestion();
        }

        // --- PDF (印刷) ---
        function openPrintWindow(content, title) {
            const win = window.open('', '_blank');
            win.document.write(`<html><head><title>${title}</title><style>
                body{font-family:'Noto Sans JP',sans-serif;padding:40px;line-height:1.7}
                h1{font-size:1.4rem;border-bottom:2px solid #166534;padding-bottom:8px}
                ol li{margin-bottom:16px}
                .en{font-family:'Times New Roman',serif}
                .ja{color:#444;font-size:0.9rem}
                .meta{color:#888;font-size:0.8rem}
                .ans{margin-top:50px;border-top:1px solid #000;padding-top:20px;page-break-before:always}
                .ans li{margin-bottom:6px}
                u{text-underline-offset:4px}
            </style></head><body><h1>${title}</h1>${content}</body></html>`);
            win.document.close();
            setTimeout(() => { win.focus(); win.print(); }, 500);
        }

        function getSelected() {
            return Array.from(selectedProblems)
                .map(id => chapterData.find(d => d.id == id))
                .filter(Boolean)
                .sort((a, b) => String(a.id).localeCompare(String(b.id), undefined, { numeric: true }));
        }

        function requireSelection(items, typeName) {
            if (items.length === 0) {
                pdfModal.classList.add('hidden');
                showMessage(`<p>選択した問題の中に「${typeName}」に使える問題がありません。</p>`, 2500);
                return false;
            }
            return true;
        }

        function blankQuestionText(item) {
            // 選択肢なしの空所問題として表示する英文
            return item.question.split('\n').map(line =>
                isJaLine(line) ? `<span class="ja">${line}</span>` : `<span class="en">${line}</span>`
            ).join('<br>');
        }

        function choicesLine(item) {
            return item.choices.map((c, i) => `${CIRCLED[i]} ${c}`).join('　');
        }

        function pdfChoiceItem(item) {
            if (item.type === 'choice') {
                return `<li>[${item.id}] ${blankQuestionText(item)}<br><span class="en">${choicesLine(item)}</span></li>`;
            }
            return `<li>[${item.id}] <span class="meta">誤りを含む下線部を選びなさい。</span><br>${blankQuestionText(item)}</li>`;
        }

        function pdfOrderingItem(item) {
            return `<li>[${item.id}] ${blankQuestionText(item)}</li>`;
        }

        function pdfCompositionItem(item) {
            const ja = (item.ja || '').split('\n')[0];
            return `<li>[${item.id}] <span class="ja">${ja}</span><br><span class="en">____________________________________________</span></li>`;
        }

        document.getElementById('download-list-btn').onclick = () => {
            const items = getSelected();
            if (!requireSelection(items, '問題リスト')) return;
            const html = `<ol>${items.map(i => `<li>[${i.id}] ${blankQuestionText(i)}<br>
                <strong>解答:</strong> <span class="en">${answerSummary(i)}</span>
                ${i.en ? `<br><span class="en">${i.en}</span>` : ''}
                ${i.ja ? `<br><span class="ja">${i.ja.replace(/\n/g, '<br>')}</span>` : ''}</li>`).join('')}</ol>`;
            openPrintWindow(html, '第20章　形容詞の語法 問題リスト');
        };

        document.getElementById('download-choice-btn').onclick = () => {
            const items = getSelected().filter(i => i.type === 'choice' || i.type === 'error');
            if (!requireSelection(items, '4択・誤り指摘テスト')) return;
            const html = `<ol>${items.map(pdfChoiceItem).join('')}</ol>
                <div class="ans"><h3>解答</h3><ol>${items.map(i => `<li>[${i.id}] ${answerSummary(i)}</li>`).join('')}</ol></div>`;
            openPrintWindow(html, '第20章　形容詞の語法 4択・誤り指摘テスト');
        };

        document.getElementById('download-blank-btn').onclick = () => {
            const items = getSelected().filter(i => i.type === 'choice' || i.type === 'fill');
            if (!requireSelection(items, '空所補充テスト')) return;
            const html = `<ol>${items.map(i => `<li>[${i.id}] ${blankQuestionText(i)}
                ${i.ja && i.type === 'choice' ? `<br><span class="ja">${i.ja.split('\n')[0]}</span>` : ''}</li>`).join('')}</ol>
                <div class="ans"><h3>解答</h3><ol>${items.map(i => `<li>[${i.id}] ${i.type === 'choice' ? i.choices[i.answerIndex] : (i.answer || i.rawAnswer)}</li>`).join('')}</ol></div>`;
            openPrintWindow(html, '第20章　形容詞の語法 空所補充テスト');
        };

        document.getElementById('download-ordering-btn').onclick = () => {
            const items = getSelected().filter(i => i.type === 'ordering');
            if (!requireSelection(items, '整序英作文テスト')) return;
            const html = `<ol>${items.map(pdfOrderingItem).join('')}</ol>
                <div class="ans"><h3>解答</h3><ol>${items.map(i => `<li>[${i.id}] <span class="en">${i.en}</span></li>`).join('')}</ol></div>`;
            openPrintWindow(html, '第20章　形容詞の語法 整序英作文テスト');
        };

        document.getElementById('download-composition-btn').onclick = () => {
            const items = getSelected().filter(i => i.en && i.ja);
            if (!requireSelection(items, '和文英訳テスト')) return;
            const html = `<ol>${items.map(pdfCompositionItem).join('')}</ol>
                <div class="ans"><h3>解答</h3><ol>${items.map(i => `<li>[${i.id}] <span class="en">${i.en}</span></li>`).join('')}</ol></div>`;
            openPrintWindow(html, '第20章　形容詞の語法 和文英訳テスト');
        };

        document.getElementById('download-mixed-btn').onclick = () => {
            const items = getSelected();
            if (!requireSelection(items, 'ランダム混合テスト')) return;
            const html = `<ol>${items.map(i => {
                const r = Math.random();
                if ((i.type === 'choice' || i.type === 'error') && r < 0.5) return pdfChoiceItem(i);
                if (i.type === 'ordering') return pdfOrderingItem(i);
                if (i.en && i.ja && r >= 0.5) return pdfCompositionItem(i);
                return `<li>[${i.id}] ${blankQuestionText(i)}</li>`;
            }).join('')}</ol>
                <div class="ans"><h3>解答</h3><ol>${items.map(i => `<li>[${i.id}] <span class="en">${i.en || answerSummary(i)}</span></li>`).join('')}</ol></div>`;
            openPrintWindow(html, '第20章　形容詞の語法 ランダム混合テスト');
        };

        // --- Event wiring ---
        startQuizBtn.onclick = startQuiz;
        closeQuizBtn.onclick = () => quizModal.classList.add('hidden');
        openPdfModalBtn.onclick = () => selectedProblems.size ? pdfModal.classList.remove('hidden') : showMessage('問題を選択してください', 2000);
        closeModalBtn.onclick = () => pdfModal.classList.add('hidden');
        selectAllCheckbox.onchange = (e) => {
            document.querySelectorAll('.problem-checkbox').forEach(cb => {
                cb.checked = e.target.checked;
                if (e.target.checked) selectedProblems.add(cb.dataset.id);
                else selectedProblems.delete(cb.dataset.id);
            });
        };

        document.addEventListener('DOMContentLoaded', renderChapter);
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCNrvDMnlN_geijgRguQrolnTIZ_rdZwyw",
            authDomain: "sokudoku-stories-db.firebaseapp.com",
            projectId: "sokudoku-stories-db",
            storageBucket: "sokudoku-stories-db.firebasestorage.app",
            messagingSenderId: "979353290932",
            appId: "1:979353290932:web:f0c512cfbe64a7afe36fe1"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Vintage のデータは 'vintage_' プレフィックスで LEAP のデータと分離する
        const appId = "vintage_chapter20";

        window.localMasteredProblems = {};

        window.applyLoadedMasteredProblems = (mastered) => {
            window.localMasteredProblems = mastered || {};
            document.querySelectorAll('.problem-item').forEach(wrapper => {
                const problemId = wrapper.dataset.id;
                const btn = wrapper.querySelector('.toggle-master-btn-local');
                if (window.localMasteredProblems[problemId] === true) {
                    wrapper.classList.add('problem-mastered');
                    if (btn) btn.innerText = '⭐ マスター解除';
                } else {
                    wrapper.classList.remove('problem-mastered');
                    if (btn) btn.innerText = '⭐ マスター';
                }
            });
        };

        window.toggleProblemMasterState = (problemId, makeMastered) => {
            window.localMasteredProblems[problemId] = makeMastered;
            if (window.currentUser) {
                const docRef = doc(db, "leap_users", window.currentUser.uid, "progress", appId);
                setDoc(docRef, { masteredWords: { [problemId]: makeMastered } }, { merge: true })
                    .then(() => window.applyLoadedMasteredProblems(window.localMasteredProblems))
                    .catch(e => {
                        console.error("Error updating master state:", e);
                        alert("マスター状態の保存に失敗しました: " + e.message);
                    });
            } else {
                window.applyLoadedMasteredProblems(window.localMasteredProblems);
                console.warn("Saving locally only.");
            }
        };

        window.saveSolvedResult = (problemId, correct) => {
            if (!window.currentUser) return;
            const docRef = doc(db, "leap_users", window.currentUser.uid, "progress", appId);
            setDoc(docRef, {
                solvedProblems: { [problemId]: correct },
                lastAccessed: new Date().toISOString()
            }, { merge: true }).catch(e => console.error("Solved save error:", e));
        };

        window.saveVintageScore = (type, score) => {
            if (window.currentUser) {
                const docRef = doc(db, "leap_users", window.currentUser.uid, "progress", appId);
                setDoc(docRef, { [type]: score }, { merge: true })
                    .catch(e => {
                        console.error("Score save error:", e);
                        alert("テスト結果の保存に失敗しました: " + e.message);
                    });
            } else {
                console.error("Score save failed: No user is logged in.");
                alert("ログイン状態が確認できないため、テスト結果を保存できませんでした。ダッシュボードから再度ログインしてください。");
            }
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                window.currentUser = user;
                const docRef = doc(db, "leap_users", user.uid, "progress", appId);

                getDoc(docRef).then((docSnap) => {
                    let mastered = {};
                    let alreadyStarted = false;

                    if (docSnap.exists()) {
                        const data = docSnap.data();
                        alreadyStarted = data.started || false;
                        mastered = data.masteredWords || {};
                    }

                    window.applyLoadedMasteredProblems(mastered);

                    if (!alreadyStarted) {
                        setDoc(docRef, {
                            started: true,
                            lastAccessed: new Date().toISOString()
                        }, { merge: true }).catch(e => console.error("Progress save error:", e));
                    }
                }).catch(e => {
                    console.error("Error loading progress:", e);
                    window.applyLoadedMasteredProblems(window.localMasteredProblems || {});
                });

                setDoc(doc(db, "leap_users", user.uid), {
                    displayName: user.displayName,
                    email: user.email,
                    photoURL: user.photoURL,
                    lastLogin: new Date().toISOString()
                }, { merge: true }).catch(e => console.error("User profile save error:", e));
            } else {
                console.warn("No user session active on this page.");
            }
        });
    </script>
</body>
